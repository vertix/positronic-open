name: Publish Release

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  publish-pypi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Enable uv (with cache)
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build sdist and wheel
        run: |
          rm -rf dist/
          uvx --from build pyproject-build --sdist --wheel

      - name: Twine check
        run: uvx twine check dist/*

      - name: Verify version matches tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          TAG="${TAG#v}"
          FILE_VER=$(python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "Tag: $TAG | pyproject.toml: $FILE_VER"
          if [ "$TAG" != "$FILE_VER" ]; then
            echo "Error: tag ($TAG) does not match project.version ($FILE_VER)" >&2
            exit 1
          fi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  publish-docker:
    runs-on: ubuntu-latest
    needs: publish-pypi
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "${AGENT_TOOLSDIRECTORY:-/opt/hostedtoolcache}/CodeQL"
          sudo rm -rf "${AGENT_TOOLSDIRECTORY:-/opt/hostedtoolcache}/node"
          sudo rm -rf "${AGENT_TOOLSDIRECTORY:-/opt/hostedtoolcache}/go"
          sudo rm -rf /usr/lib/jvm
          sudo docker system prune -af || true
          df -h

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push versioned images
        working-directory: docker
        env:
          PUBLISH_RELEASE: "1"
        run: |
          # Unset CI so `ifdef CI` blocks (which push :latest) do not fire —
          # a release may be cut from a non-main commit and must not move :latest.
          unset CI
          VERSION=$(sed -n 's/^version = "\([^"]*\)"/\1/p' ../pyproject.toml | head -n 1)
          make push IMAGE_TAG=v${VERSION}
